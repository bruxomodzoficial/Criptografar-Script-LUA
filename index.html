<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Criptografar Script LUA</title>

<style>
body{
background:#0b0b0b;
color:#00ff9c;
font-family:monospace;
text-align:center;
padding:40px;
}

.box{
border:2px solid #00ff9c;
padding:30px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 20px #00ff9c;
}

button{
background:#00ff9c;
border:none;
padding:12px 20px;
margin-top:15px;
cursor:pointer;
font-weight:bold;
}

textarea{
width:100%;
height:260px;
margin-top:20px;
background:#000;
color:#00ff9c;
border:1px solid #00ff9c;
padding:10px;
}

#msg{
margin-top:15px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h2>Criptografar Script LUA</h2>

<input type="file" id="fileInput" accept=".lua">

<br>

<button id="btn">Criptografar</button>

<div id="msg"></div>

<textarea id="result" placeholder="Script criptografado aparecerá aqui"></textarea>

<button onclick="copyScript()">Copiar Script</button>

</div>

<script>

const KEY = "ISACMODSTV";

function xorEncrypt(text){

let result="";

for(let i=0;i<text.length;i++){

let k = KEY.charCodeAt(i % KEY.length);

result += String.fromCharCode(text.charCodeAt(i) ^ k);

}

return result;

}

document.getElementById("btn").onclick = function(){

let fileInput = document.getElementById("fileInput");
let msg = document.getElementById("msg");

if(!fileInput.files.length){

msg.innerText = "Selecione um arquivo .lua";
return;

}

msg.innerText = "Criptografando...";

let file = fileInput.files[0];
let reader = new FileReader();

reader.onload = function(e){

let content = e.target.result;

let xor = xorEncrypt(content);
let encoded = btoa(xor);

let loader = `

local function loader(enc)

local key = "ISAC MODS TV"

-- XOR
local function xorDec(data)
local out = {}
for i = 1, #data do
local k = key:byte(((i - 1) % #key) + 1)
out[i] = string.char(bit32.bxor(data:byte(i), k))
end
return table.concat(out)
end

-- BASE64 DECODE
local b='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'

local function base64Decode(data)
data = data:gsub('[^'..b..'=]', '')
return (data:gsub('.', function(x)
if x == '=' then return '' end
local r,f='',(b:find(x)-1)
for i=6,1,-1 do
r = r .. (f%2^i - f%2^(i-1) > 0 and '1' or '0')
end
return r
end):gsub('%d%d%d?%d?%d?%d?%d?%d?', function(x)
if #x ~= 8 then return '' end
local c = 0
for i = 1, 8 do
c = c + (x:sub(i,i) == '1' and 2^(8-i) or 0)
end
return string.char(c)
end))
end

local decoded = xorDec(base64Decode(enc))

local f = load(decoded)

if f then
pcall(f)
end

end

local PAYLOAD = [[${encoded}]]

loader(PAYLOAD)

`;

document.getElementById("result").value = loader;

msg.innerText = "Criptografado com sucesso ✔";

};

reader.readAsText(file);

}

function copyScript(){

let txt = document.getElementById("result");

if(txt.value === ""){
alert("Nada para copiar");
return;
}

txt.select();
navigator.clipboard.writeText(txt.value);

alert("Script copiado ✔");

}

</script>

</body>
</html>
